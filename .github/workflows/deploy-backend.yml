name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create deployment package
        run: |
          cd backend
          zip -r ../deploy.zip . \
            -x "*.git*" "venv/*" ".venv/*" "__pycache__/*" "*.pyc" \
            "db.sqlite3" ".env" ".env.*" "media/*" "staticfiles/*" ".azure/*"

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group greaby \
            --name demoforge-api \
            --src-path deploy.zip \
            --type zip \
            --async false \
            --clean true

      - name: Restart Web App
        run: az webapp restart --resource-group greaby --name demoforge-api

      - name: Verify health
        run: |
          for i in 1 2 3 4 5 6 7 8 10 12; do
            sleep "$i"
            body=$(curl -s "https://demoforge-api.azurewebsites.net/api/health/" || true)
            echo "attempt: $body"
            echo "$body" | grep -q '"database":"postgresql"' && \
            echo "$body" | grep -q '"storage":"azure_blob"' && exit 0
          done
          echo "Health check failed — production not on PostgreSQL + Azure Blob" >&2
          exit 1
