name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: demoforge-api
          package: backend

      - name: Restart Web App
        run: az webapp restart --resource-group greaby --name demoforge-api

      - name: Verify health
        run: |
          for wait in 20 30 40 50 60 60 60; do
            sleep "$wait"
            body=$(curl -s "https://demoforge-api.azurewebsites.net/api/health/" || true)
            echo "$body"
            echo "$body" | grep -q '"database":"postgresql"' && \
            echo "$body" | grep -q '"storage":"azure_blob"' && exit 0
          done
          echo "Health check failed" >&2
          exit 1
